services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-seed:
    image: mysql:8.4
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - ./docker/seed.sql:/seed/seed.sql:ro
    command:
      - sh
      - -c
      - mysql -h db -uroot -p$$MYSQL_ROOT_PASSWORD $$MYSQL_DATABASE < /seed/seed.sql
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Warehouse_managment/Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-inventory_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SECRET_JWT_STRING: ${SECRET_JWT_STRING:-change-this-jwt-secret}
    depends_on:
      db:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8081"
    volumes:
      - ./product-images:/app/product-images

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

volumes:
  mysql_data:
